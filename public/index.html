<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    
    <!-- PWA Meta Tags -->
    <meta name="theme-color" content="#0f172a" />
    <meta name="description" content="RhythmSecret - Advanced Rhythm Training Metronome" />
    
    <!-- iOS Meta Tags -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="RhythmSecret" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    
    <!-- Android Meta Tags -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="application-name" content="RhythmSecret" />
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://rhythmsecret.vercel.app/" />
    <meta property="og:title" content="RhythmSecret - Advanced Rhythm Training" />
    <meta property="og:description" content="Professional metronome and rhythm trainer for musicians" />
    <meta property="og:image" content="/og-image.png" />
    
    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://rhythmsecret.vercel.app/" />
    <meta property="twitter:title" content="RhythmSecret - Advanced Rhythm Training" />
    <meta property="twitter:description" content="Professional metronome and rhythm trainer for musicians" />
    <meta property="twitter:image" content="/twitter-image.png" />
    
    <!-- Manifest -->
    <link rel="manifest" href="/manifest.json" />
    
    <!-- Preconnect -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
    
    <title>RhythmSecret - Advanced Rhythm Training</title>
    
    <!-- Preload critical resources -->
    <link rel="preload" href="/src/main.jsx" as="script" />
    <link rel="preload" href="/src/index.css" as="style" />
    
    <style>
      /* Critical CSS - Load before React */
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      
      body {
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
        background: #0f172a;
        color: #ffffff;
        overflow: hidden;
        height: 100vh;
      }
      
      #root {
        height: 100%;
        width: 100%;
      }
      
      /* Loading screen */
      .loading-screen {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: #0f172a;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 9999;
      }
      
      .loading-spinner {
        width: 50px;
        height: 50px;
        border: 3px solid rgba(59, 130, 246, 0.3);
        border-radius: 50%;
        border-top-color: #3b82f6;
        animation: spin 1s ease-in-out infinite;
      }
      
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
      
      .loading-text {
        margin-top: 20px;
        color: #94a3b8;
        font-weight: 500;
      }
      
      /* No JavaScript fallback */
      .no-js {
        display: none;
        text-align: center;
        padding: 40px;
        color: #ffffff;
      }
      
      .no-js h1 {
        color: #ef4444;
        margin-bottom: 20px;
      }
      
      noscript .no-js {
        display: block;
      }
    </style>
  </head>
  <body>
    <!-- Loading screen - hidden by React -->
    <div id="loading" class="loading-screen">
      <div class="loading-spinner"></div>
      <div class="loading-text">Loading RhythmSecret...</div>
    </div>
    
    <!-- No JavaScript fallback -->
    <noscript>
      <div class="no-js">
        <h1>JavaScript Required</h1>
        <p>RhythmSecret requires JavaScript to function properly.</p>
        <p>Please enable JavaScript in your browser settings.</p>
      </div>
    </noscript>
    
    <!-- React root -->
    <div id="root"></div>
    
    <!-- Script to hide loading screen when React loads -->
    <script>
      // Hide loading screen when React mounts
      window.addEventListener('DOMContentLoaded', () => {
        const loading = document.getElementById('loading');
        if (loading) {
          // Wait a bit to ensure React is ready
          setTimeout(() => {
            loading.style.opacity = '0';
            loading.style.transition = 'opacity 0.3s ease';
            setTimeout(() => {
              loading.style.display = 'none';
            }, 300);
          }, 500);
        }
        
        // Check for service worker support
        if ('serviceWorker' in navigator) {
          // Service worker will be registered by main.jsx
          console.log('Service Worker supported');
        }
        
        // Theme detection
        const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        if (prefersDark) {
          document.documentElement.classList.add('dark');
        }
      });
      
      // Handle offline/online status
      window.addEventListener('online', () => {
        document.documentElement.classList.remove('offline');
        document.documentElement.classList.add('online');
      });
      
      window.addEventListener('offline', () => {
        document.documentElement.classList.remove('online');
        document.documentElement.classList.add('offline');
      });
    </script>
    
    <!-- Entry point -->
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
